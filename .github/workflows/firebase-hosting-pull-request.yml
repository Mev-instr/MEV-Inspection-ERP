name: Deploy to Firebase Hosting on PR
'on': pull_request
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install && npm run build && echo "${{ github.sha }}" > dist/version.txt
      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa.json
          
          set +e
          # For PRs, we deploy to a preview channel based on the PR number
          CHANNEL_ID="pr-${{ github.event.number }}-${{ github.event.pull_request.head.ref }}"
          # Truncate channel ID to max 40 chars and remove invalid chars to be safe
          CHANNEL_ID=$(echo "$CHANNEL_ID" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c 1-40)
          
          OUTPUT=$(npx firebase-tools hosting:channel:deploy $CHANNEL_ID --project gen-lang-client-0459155438 --non-interactive 2>&1)
          EXIT_CODE=$?
          set -e
          
          echo "$OUTPUT"
          
          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "is the current active version"; then
              echo "✅ False positive error detected (CLI retry bug). The deployment actually succeeded on the backend."
              exit 0
            else
              echo "❌ Deployment failed."
              exit $EXIT_CODE
            fi
          fi
          
          echo "✅ Deployment successful."
